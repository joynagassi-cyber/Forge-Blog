<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="forge-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="spark-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#forge-glow)"/>

  <!-- Enclume (F vertical stroke - bold rectangle/anvil) -->
  <rect x="186" y="140" width="48" height="232" rx="12" fill="#ffffff"/>

  <!-- Étincelle (F horizontal stroke - circle/spark that arcs right) -->
  <path d="M186 212 
           C186 212 234 200 280 212 
           C326 224 340 260 340 260" 
        fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>

  <!-- Small spark particles off the F -->
  <circle cx="320" cy="180" r="6" fill="#c4b5fd" opacity="0.8"/>
  <circle cx="340" cy="200" r="4" fill="#a78bfa" opacity="0.6"/>
  <circle cx="160" cy="340" r="5" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="150" cy="310" r="3" fill="#a78bfa" opacity="0.4"/>

  <!-- Subtle inner glow ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.08"/>
</svg>
